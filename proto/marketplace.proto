syntax = "proto3";

package marketplace_sd;

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  float price = 4;
  int32 quantity_in_stock = 5;
}

message ListProductsRequest {}

message ListProductsResponse {
  repeated Product product_list = 1;
}

message GetProductRequest {
  string product_id = 1;
}

message OrderItem {
  string product_id = 1;
  int32 quantity = 2;
}

message PlaceOrderRequest {
  string buyer_id = 1;
  repeated OrderItem ordered_items = 2;
}

message Order {
  string id = 1;
  string buyer_id = 2;
  repeated OrderItem ordered_items = 3;
  string status = 4;
  int64 creation_time = 5;
}

message GetOrderRequest {
  string order_id = 1;
}

message ReplicateProductRequest {
  Product product = 1;
}

message ReplicateOrderRequest {
  Order order = 1;
}

message ReplicationAcknowledgement {
  bool success = 1;
}

service MarketplaceService {
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc GetProduct(GetProductRequest) returns (Product);
  rpc PlaceOrder(PlaceOrderRequest) returns (Order);
  rpc GetOrder(GetOrderRequest) returns (Order);
}

service ReplicationService {
  rpc ReplicateProduct(ReplicateProductRequest) returns (ReplicationAcknowledgement);
  rpc ReplicateOrder(ReplicateOrderRequest) returns (ReplicationAcknowledgement);
}