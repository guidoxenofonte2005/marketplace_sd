syntax = "proto3";

package notifications;

message Event {
  string event_id = 1;
  string event_type = 2;
  string target_user = 3; // ID do usuário
  string payload = 4;
  int64 lamport_ts = 5; // timestamp lógico de Lamport
  int64 emmited_time = 6;
}

message EmitEventResponse {
  bool received = 1;
  string event_id = 2;
}

message SubscribeRequest {
  string user_id = 1;
}

message GetHistoryRequest {
  string user_id = 1;
  int32 limit = 2;
}

message GetHistoryResponse {
  repeated Event events = 1;
}

service NotificationService {
  rpc EmitEvent(Event) returns (EmitEventResponse);

  rpc Subscribe(SubscribeRequest) returns (stream Event);

  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
}

service NotificationReplicationService {
  rpc ReplicateEvent(Event) returns (EmitEventResponse);
}

